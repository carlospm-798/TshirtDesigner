<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="css/index.css">
    </head>

    <body>

        <div id="main_window">
            <h1 class="main_header">The T-Shirt Designer Game</h1>
            <p class="general_description">This is a personal project based in the Tee K.O. and Gartic Phone games.</p>

            <div class="btn_lobby_group">
                <button class="btn_lobby" id="generate_lobby">Generate Lobby</button>
                <button class="btn_lobby" id="enter_lobby">Enter Lobby</button>
            </div>

            <footer class="lobby_footer">
                <p class="lobby_p_footer">Done in my free time, just for fun :)</p>
                <p class="contact_data">Follow me in LinkedIn and Git-Hub:</p>

                <a href="https://www.linkedin.com/in/carlos-p-m/" target="_blank" class="social_text">
                    <ion-icon name="logo-linkedin" class="social-icon"></ion-icon>
                    LinkedIn
                </a>
                <a href="https://github.com/carlospm-798" target="_blank" class="social_text">
                    <ion-icon name="logo-github" class="social-icon"></ion-icon>
                    Personal Git-Hub
                </a>
                <a href="https://github.com/CarlosPM-in" target="_blank" class="social_text">
                    <ion-icon name="logo-github" class="social-icon"></ion-icon>
                    Professional Git-Hub
                </a>

            </footer>
            <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
            <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
        </div>

        <div id="lobby" class="hidden">
            <h1 class="lobby_header">Lobby menu</h1>

            <div class="users_form">
                <form class="input_form_class" autocomplete="off">
                    <label for="uname" class="input_username_header">Username</label><br>
                    <input type="text" id="uname" name="uname" class="input_username">
                    <label for="lcode" class="input_lobbycode_header">Lobby Code</label><br>
                    <input type="text" id="lcode" name="lcode" class="input_username">
                    <button class="input_username_btn" id="input_username_btn" disabled>Enter</button>
                </form>
            </div>

            <div class="users_in_lobby">
                <p class="host_paragraph">Host:</p>
                <ul class="host_list"></ul>

                <p class="users_paragraph">Users:</p>
                <ul class="users_list"></ul>
            </div>
        </div>

        <script type="module" src="js/index.js"></script>
    </body>
</html>
